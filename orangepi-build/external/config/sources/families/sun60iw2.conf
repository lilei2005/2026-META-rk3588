source "${BASH_SOURCE%/*}/include/sunxi64_common.inc"

LINUXFAMILY=sun60iw2

[[ -z $CPUMIN ]] && CPUMIN=416000
[[ -z $CPUMAX ]] && CPUMAX=2002000
GOVERNOR=ondemand

OFFSET=32
OVERLAY_PREFIX='sun60i-t736'
BOOTBRANCH='branch:v2018.05-sun60iw2'
UBOOT_COMPILER="arm-linux-gnueabi-"
UBOOT_USE_GCC='> 6.0'
BOOTENV_FILE='sun60iw2.txt'
BOOTSCRIPT='boot-sun60iw2.cmd:boot.cmd'
KERNEL_USE_GCC='> 10.0'
ATFSOURCE=""
ATF_COMPILE="no"
INITRD_ARCH=arm
UBOOT_TARGET_MAP=";;dts/${BOARD}-u-boot.dts boot0_sdcard.fex boot0_spinor_a733.fex boot0_ufs.fex boot_package.fex"
KERNELPATCHDIR=${BOARDFAMILY}-${BRANCH}
MAINLINE_UBOOT_SOURCE='https://gitee.com/orangepi-xunlong/u-boot-orangepi.git'

case $BRANCH in

	legacy)
		if [[ $GITEE_SERVER == yes ]]; then
			KERNELSOURCE="https://gitee.com/orangepi-xunlong/orange-pi-5.15-sun60iw2.git"
		fi

		KERNELBRANCH="branch:orange-pi-5.15-sun60iw2"
		LINUXCONFIG="linux-sun60iw2-legacy"

		if [[ "${BOARD}" =~ "orangepi4pro"|"orangepizero3w" ]]; then
			OVERLAY_PREFIX='sun60i-a733'
			LINUXCONFIG="linux-sun60iw2-legacy-a733"
		fi

	;;

	current)
		if [[ $GITEE_SERVER == yes ]]; then
			KERNELSOURCE="https://gitee.com/orangepi-xunlong/orange-pi-6.6-sun60iw2.git"
		fi

		KERNELBRANCH="branch:orange-pi-6.6-sun60iw2"
		LINUXCONFIG="linux-sun60iw2-current"

		if [[ "${BOARD}" =~ "orangepi4pro"|"orangepizero3w" ]]; then
			OVERLAY_PREFIX='sun60i-a733'
			LINUXCONFIG="linux-sun60iw2-current-a733"
		fi
	;;
esac

family_tweaks_s()
{
	if [[ ${DESKTOP_ENVIRONMENT} == gnome ]]; then
		run_on_sdcard "DEBIAN_FRONTEND=noninteractive apt-get install -y gnome-screenshot tightvncserver gnome-bluetooth"
		cp $EXTER/packages/blobs/desktop/desktop-wallpapers/orangepi-default.png ${SDCARD}/usr/share/backgrounds/warty-final-ubuntu.png
	fi

	if [[ $RELEASE == bookworm && ${DESKTOP_ENVIRONMENT} == gnome ]]; then
		sed -i "s/user-session.*/user-session=gnome-wayland/" ${SDCARD}/etc/lightdm/lightdm.conf.d/22-orangepi-autologin.conf
		run_on_sdcard "systemctl mask sleep.target suspend.target hibernate.target hybrid-sleep.target" > /dev/null 2>&1
	fi

	[[ $RELEASE == jammy && ${DESKTOP_ENVIRONMENT} == xfce ]] && chroot $SDCARD /bin/bash -c "apt-get -y -qq install ocl-icd-libopencl1" >/dev/null 2>&1

	#if [[ "${BOARD}x" == orangepi4ax ]]; then
	#	nvram=$EXTER/cache/sources/orangepi-firmware-git
	#	[[ -f ${nvram}/nvram_ap6256.txt-$BOARD ]] && cp ${nvram}/nvram_ap6256.txt-${BOARD} ${SDCARD}/lib/firmware/nvram_ap6256.txt
	#fi

	rsync -a --chown=root:root "${EXTER}"/packages/bsp/overlays_arm64/* ${SDCARD}/

	chroot $SDCARD /bin/bash -c "apt-get -y -qq install libopencv-dev mtd-utils rfkill bluetooth bluez bluez-tools ir-keytable tree lirc v4l-utils dnsmasq" >/dev/null 2>&1

	if [[ "$RELEASE" =~ "bookworm"|"bullseye" ]]; then
		cat <<-'EOF' > "${SDCARD}"/usr/share/initramfs-tools/hooks/custom
		cp /bin/grep ${DESTDIR}/bin
		cp /bin/mount ${DESTDIR}/bin
		cp /lib/aarch64-linux-gnu/libmount.so.1 ${DESTDIR}/lib
		cp /lib/aarch64-linux-gnu/libpcre.so.3 ${DESTDIR}/lib 2>/dev/null || true
		EOF
		chmod +x "${SDCARD}"/usr/share/initramfs-tools/hooks/custom
	fi

	if [[ $RELEASE =~ "jammy"|"focal"|"bookworm" ]]; then
		run_on_sdcard "apt-get -y -qq install overlayroot"
		dpkg_install_deb_chroot "${EXTER}/cache/sources/sun60iw2_packages/bullseye/libAWIspApi/libAWIspApi_602_1.0.0_arm64.deb"
	elif [[ $RELEASE == "bullseye" ]]; then
		run_on_sdcard "apt-get -y -qq install cryptsetup"
		dpkg_install_deb_chroot "${EXTER}/cache/sources/sun60iw2_packages/bullseye/overlayroot/overlayroot_0.47ubuntu1_all.deb"
		dpkg_install_deb_chroot "${EXTER}/cache/sources/sun60iw2_packages/bullseye/libAWIspApi/libAWIspApi_602_1.0.0_arm64.deb"
	fi

	if [[ $BUILD_DESKTOP == yes ]]; then

		sed -i "s/auto-profiles = yes/auto-profiles = no/" ${SDCARD}/usr/share/pulseaudio/alsa-mixer/profile-sets/default.conf

		echo "load-module module-alsa-sink device=hw:0,0 sink_name=HDMI-Playback sink_properties=\"device.description='HDMI Audio'\"" >> ${SDCARD}/etc/pulse/default.pa
		echo "load-module module-alsa-sink device=hw:1,0 sink_name=AudioCodec-Playback sink_properties=\"device.description='Audio Codec'\"" >> ${SDCARD}/etc/pulse/default.pa


		case $RELEASE in
			bullseye|bookworm) chroot $SDCARD /bin/bash -c "apt-get -y -qq install firefox-esr" >> "${DEST}"/${LOG_SUBPATH}/install.log 2>&1 ;;
		esac

		chroot $SDCARD /bin/bash -c "apt-get -y -qq install vlc mpv" >> "${DEST}"/${LOG_SUBPATH}/install.log 2>&1

	fi

	if [[ ${BRANCH} == current ]]; then
		SERIALCON="ttyS0"
	fi

	rsync -a --chown=root:root "${EXTER}"/packages/bsp/sun60iw2/* ${SDCARD}/
	rsync -a --chown=root:root $EXTER/cache/sources/sun60iw2_packages/npu/* ${SDCARD}/

	if [[ $RELEASE =~ bullseye && ${SELECTED_CONFIGURATION} == desktop ]]; then
		local packages_dir="$EXTER/cache/sources/sun60iw2_packages"
		#local packages_to_install=("xserver" "glmark2" "libcedarc" "gst-omx")
		local packages_to_install=("libAWIspApi" "glmark2" "libcedarc" "gst-omx-generic1.0" "gstreamer1.0-plugins-good" "vlc")
		chroot $SDCARD /bin/bash -c "apt-get -y -qq install gstreamer1.0-x gstreamer1.0-plugins-bad gstreamer1.0-alsa" >> "${DEST}"/${LOG_SUBPATH}/install.log 2>&1

		cp -rf ${packages_dir}/bullseye/xserver/xserver-xorg-img-bxm_1.21.1-2_arm64.deb ${SDCARD}/
		chroot $SDCARD /bin/bash -c "dpkg -i --force-overwrite /xserver-xorg-img-bxm_1.21.1-2_arm64.deb" >> "${DEST}"/${LOG_SUBPATH}/install.log 2>&1
		rm -rf ${SDCARD}/xserver-xorg-img-bxm_1.21.1-2_arm64.deb

		for package in ${packages_to_install[@]}; do
			local package_dir="${packages_dir}/bullseye/${package}"
			[[ -d "${package_dir}" ]] && dpkg_install_debs_chroot "${package_dir}"
		done

		install -m 755 -o 1000 -g 1000 -d $SDCARD/home/$OPI_USERNAME/.config/vlc
		install -m 600 -o 1000 -g 1000  $packages_dir/bullseye/vlc/vlcrc $SDCARD/home/$OPI_USERNAME/.config/vlc

		sed -i 's|^Exec=.*|Exec=env LD_LIBRARY_PATH=/usr/local/lib exo-open --launch WebBrowser %u|' $SDCARD/usr/share/applications/xfce4-web-browser.desktop
		sed -i 's|^Exec=.*|Exec=env LD_LIBRARY_PATH=/usr/local/lib /usr/lib/firefox-esr/firefox-esr %u|' $SDCARD/usr/share/applications/firefox-esr.desktop

		local version
		version=$(grab_version "$LINUXSOURCEDIR")
		install -m 755 -d $SDCARD/lib/modules/$version-$BOARDFAMILY/extra
		install -m 644 ${SRC}/.tmp/gpu_modules_sun60iw2/pvrsrvkm.ko $SDCARD/lib/modules/$version-$BOARDFAMILY/extra
		depmod -b $SDCARD $version-$BOARDFAMILY
	fi

	install_wiringop
}

